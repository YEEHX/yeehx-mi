  <div class="field" style="text-align:center;padding-top:4px">${d.tampered?`<div style="font-weight:800;font-size:15px">玩椰 YEEHX · 觅影</div>`:`<img src="/web/觅影-logo.png" style="height:32px" onerror="this.style.display='none'">`}<div style="font-size:16px;font-weight:700;margin-top:8px">觅影 <span class="muted" style="font-weight:400;font-size:12px">v${attr(d.version)}</span></div><div style="margin-top:4px">${attr(b.tagline||'')}</div><div style="color:var(--gold);font-size:12px;margin-top:2px">${attr(b.slogan||'')}</div>
  <div class="row" style="justify-content:center;margin-top:8px"><a class="btn" style="text-decoration:none;line-height:28px" href="/web/guide.html">图文使用说明</a><button class="btn" id="updBtn" onclick="checkUpdate(true)">检查更新</button></div><div id="updMsg" class="muted" style="font-size:12px;margin-top:4px"></div></div>
  <div class="field"><label>60 秒上手</label><div class="muted" style="font-size:12px;line-height:1.8">① 点「快扫文件夹」选一块盘，几分钟建起可搜索底稿 → ② 左侧标签筛选，或顶部直接搜 → ③ 金框「AI 找素材」一句话描述，还能直接说"导出到桌面某文件夹" → ④ 点图看大图选片，1-5 打星 → ⑤ 选中后 下载 / 导出。盘里日后新增素材：选中它点「同步」，只补新增和未打标的。原素材永远只读。</div></div>
  <div class="field"><label>快捷键</label><div class="muted" style="font-size:12px;line-height:1.8">方向键 网格移动 · 空格 选中 · 回车 大图 · I 详情 · A 全选 · 1-5 / 0 给焦点或选中打星 · 大图内 ←→ 翻页 · Shift+勾选 范围多选 · Esc 关弹层 / 清空选中</div></div>
  <div class="field"><label>接入 AI 助手</label><div class="muted" style="font-size:12px;line-height:1.8">觅影自带 MCP 接口：任何支持 MCP 的 AI 助手都能用人话指挥它——找素材、回传预览、发送原片、导出 AI 底图，是 AI 影视自动化工作流的素材入口。接入方法见 app/Hermes接入觅影.md。</div></div>
  <div class="field"><label>作者</label><div style="margin-bottom:8px">${attr(b.author||'玩椰')}</div><div class="row">${links}</div><div class="row" style="margin-top:8px"><button class="btn" onclick="copyText('${esc(b.copy_id||'玩椰')}','已复制全网 ID：${esc(b.copy_id||'玩椰')}')">复制全网 ID「${attr(b.copy_id||'玩椰')}」</button>${b.email?`<span class="chip">合作：${attr(b.email)}</span>`:''}</div></div>
  ${don}
  <div class="field"><label>最近更新</label><pre style="white-space:pre-wrap;font-size:12px;line-height:1.7;color:var(--muted);font-family:inherit;margin:0">${attr(d.changelog||'')}</pre></div>
  <div class="muted" style="font-size:12px;margin-top:8px;border-top:1px solid var(--line);padding-top:8px">铁律：原素材只读，绝不重命名 / 移动 / 删除 / 改写；一切数据都在 app/out/，数据库可重建。</div>`);}
function maybeWelcome(){if(localStorage.getItem('miying_welcomed'))return;localStorage.setItem('miying_welcomed','1');
  openDrawer('欢迎使用觅影',`<div class="field" style="text-align:center;padding-top:6px"><img src="/web/觅影-logo.png" style="height:38px" onerror="this.style.display='none'"><div style="font-size:16px;font-weight:700;margin-top:10px">拍过的，都能轻松找到。</div><div class="muted" style="margin-top:6px">扫描硬盘 → AI 理解素材 → 自然语言搜索 → 一键导出。<br>原始素材永远只读，放心扫。</div></div><div class="row" style="justify-content:center;margin-top:12px"><button class="btn red" onclick="closeDrawer();folderStrategy('quick')">快扫一块盘试试</button><button class="btn" onclick="location.href='/web/guide.html'">使用说明</button><button class="btn ghost" onclick="closeDrawer()">先逛逛</button></div>`);}
/* ── 检查更新：手动（关于页按钮）+ 启动静默一次；仅请求 yeehx.com/miying/version.json，可在设置关闭 ── */
async function checkUpdate(manual){let d;try{d=await jget('/api/update/check',null,true)}catch{if(manual)toast('检查失败，稍后再试','err');return}
  const msg=$('#updMsg');
  if(!d.enabled){if(msg)msg.textContent='已在设置中关闭检查更新';return}
  if(!d.ok){if(manual&&msg)msg.textContent='连不上更新服务器（不影响使用）';return}
  if(!d.has_update){if(manual){if(msg)msg.textContent=`已是最新版（v${d.current}）`;toast('已是最新版','ok')}return}
  if(msg)msg.innerHTML=`发现新版本 v${attr(d.latest)}：${attr(d.notes||'')} <a href="${attr(d.url)}" target="_blank">去下载</a>`;
  if(!manual&&localStorage.getItem('miying_upd_skip')!==d.latest&&!$('#updbanner')){
    const el=document.createElement('div');el.id='updbanner';el.className='';el.style.cssText='display:flex;gap:10px;align-items:center;padding:8px 16px;background:#12251a;border-bottom:1px solid #204a33;flex-wrap:wrap';
    el.innerHTML=`<b>觅影 v${attr(d.latest)} 发布了</b><span class="muted">${attr((d.notes||'').slice(0,80))}</span><div class="spacer"></div><a class="btn" style="line-height:28px;text-decoration:none;text-align:center" href="${attr(d.url)}" target="_blank">去下载</a><button class="btn ghost" onclick="localStorage.setItem('miying_upd_skip','${attr(d.latest)}');this.closest('#updbanner').remove()">这个版本不再提醒</button>`;
    document.querySelector('.top').after(el);}}

/* 首跑引导：连不上 AI 模型时给一条引导（不影响扫盘/浏览/搜索） */
async function checkAIGuide(){if($('#setupwiz'))return;let ok=false;try{const d=await jget('/api/ping',null,true);ok=!!d.ok}catch{}
  if(ok||localStorage.getItem('miying_ai_guide_off')||$('#aibanner'))return;
  const el=document.createElement('div');el.id='aibanner';
  el.innerHTML=`<b>还没连上 AI 模型</b><span class="muted">扫盘 / 浏览 / 套LUT / 搜索都不受影响；要自动打标需要本地 ollama 或填 API。</span><div class="spacer"></div><button class="btn" onclick="this.closest('#aibanner').remove();go('settings')">去设置</button><a class="btn" style="line-height:28px;text-decoration:none;text-align:center" href="https://ollama.com" target="_blank">装 ollama</a><button class="btn ghost" onclick="localStorage.setItem('miying_ai_guide_off','1');this.closest('#aibanner').remove()">不再提示</button>`;
  document.querySelector('.top').after(el);}

/* ══ 首跑向导：欢迎承诺 → AI 模型三选一 → 上手三步。服务端 setup_done 判定 ══ */
let WIZ_STATUS=null,WIZ_UPGRADE=null;
async function maybeSetupWizard(){try{WIZ_STATUS=await jget('/api/setup/status',null,true)}catch{return}
  if(!WIZ_STATUS.first_run)return;
  localStorage.setItem('miying_welcomed','1');   // 向导替代旧欢迎抽屉，防双弹
  // 升级搬家优先：旁边有旧版本的库（比如 MiYing-v2.0.0 文件夹），先问搬不搬——
  // 搬完 reload 直接进主界面（库都在，向导自动不再弹），全新用户才走三步向导
  try{const u=await jget('/api/upgrade/candidates',null,true);
    if(u.candidates&&u.candidates.length){WIZ_UPGRADE=u.candidates[0];wizShowUpgrade();return}}catch{}
  wizShow(1);}
function wizShowUpgrade(err){const c=WIZ_UPGRADE;
  wizBox(`<div style="text-align:center"><img src="/web/觅影-logo.png" style="height:44px" onerror="this.style.display='none'">
    <div style="font-size:19px;font-weight:800;margin:12px 0 4px">欢迎升级，先把库搬过来</div>
    <div class="muted" style="margin-bottom:14px">检测到旁边的旧版本觅影还有你的素材库——一键搬进新版本，标签、星级、设置全部保留，不用重扫。</div></div>
    <div class="pledge"><span class="ico">库</span><div><b>${esc(c.name)}${c.version?'（v'+esc(c.version)+'）':''}</b><span class="muted">${Number(c.assets).toLocaleString()} 条素材 · ${esc(c.path)}</span></div></div>
    ${err?`<div style="color:#e05c5c;font-size:13px;margin:10px 2px 0">${esc(err)}</div>`:''}
    <div class="wizfoot"><button class="btn red" id="wizMigBtn" onclick="wizMigrate()">一键搬过来（推荐）</button><button class="btn ghost" onclick="wizShow(1)">不搬，全新开始</button></div>`);}
async function wizMigrate(){const b=$('#wizMigBtn');if(b){b.disabled=true;b.textContent='正在搬家…（库大要几分钟，别关窗口）'}
  try{const r=await jpost('/api/upgrade/migrate',{path:WIZ_UPGRADE.path});wizShowCleanup(r);}
  catch(e){wizShowUpgrade(String(e&&e.message||'搬家失败，请重试').slice(0,160));}}
/* 搬完顺手问一句旧文件夹的去留（移废纸篓=可恢复；绝不自动删任何东西） */
function wizShowCleanup(r){
  wizBox(`<div style="text-align:center"><div style="font-size:19px;font-weight:800;margin:6px 0 4px">搬家完成</div>
    <div class="muted" style="margin-bottom:14px">${Number(r.assets).toLocaleString()} 条素材已就位，标签、星级、设置全部保留。</div></div>
    <div class="pledge"><span class="ico">旧</span><div><b>旧文件夹已经不含你的数据</b><span class="muted">${esc(r.from||'')}<br>移到废纸篓可随时恢复；留着也不影响使用。</span></div></div>
    <div class="wizfoot"><button class="btn red" id="wizCleanBtn" onclick="wizCleanup()">移到废纸篓</button><button class="btn ghost" onclick="location.reload()">留着，以后我自己删</button></div>`);}
async function wizCleanup(){const b=$('#wizCleanBtn');if(b){b.disabled=true;b.textContent='正在移入废纸篓…'}
  try{await jpost('/api/upgrade/cleanup',{});toast('旧文件夹已移入废纸篓','ok')}catch{}
  setTimeout(()=>location.reload(),600);}
async function wizOpen(){WIZ_STATUS=await jget('/api/setup/status',null,true).catch(()=>({arch:'',ollama_alive:false}));wizShow(1);}   // 设置页「重看引导」
function wizBox(inner){let w=$('#setupwiz');if(!w){w=document.createElement('div');w.id='setupwiz';document.body.appendChild(w)}
  w.innerHTML=`<div class="wizcard">${inner}</div>`;}
function wizDots(n){return `<div class="wizdots">${[1,2,3].map(i=>`<i class="${i<=n?'on':''}"></i>`).join('')}</div>`}
function wizShow(step){
  if(step===1){wizBox(`${wizDots(1)}
    <div style="text-align:center"><img src="/web/觅影-logo.png" style="height:44px" onerror="this.style.display='none'">
    <div style="font-size:19px;font-weight:800;margin:12px 0 4px">拍过的，都能轻松找到。</div>
    <div class="muted" style="margin-bottom:16px">扫描硬盘 → AI 理解素材 → 自然语言搜索 → 一键调用。<br>开始之前，三个承诺：</div></div>
    <div class="pledge"><span class="ico">读</span><div><b>原素材永远只读</b><span class="muted">绝不重命名、移动、删除、改写你的任何文件——放心扫任何一块盘。</span></div></div>
    <div class="pledge"><span class="ico">盒</span><div><b>数据自包含</b><span class="muted">缩略图、标签、数据库全部只写进觅影自己的数据目录（app/out/），删掉整个文件夹即彻底卸载。</span></div></div>
    <div class="pledge"><span class="ico">备</span><div><b>请保持备份习惯</b><span class="muted">觅影不碰原片，但硬盘本身有寿命——重要素材请维持你原有的备份流程。</span></div></div>
    <div class="wizfoot"><button class="btn red" onclick="wizShow(2)">开始设置</button><button class="btn ghost" onclick="wizFinish(false)">以后再说</button></div>`)}
  else if(step===2){jget('/api/settings',null,true).then(s=>{const m=s.model;PROVIDER=m.provider||'local';
    const intel=(WIZ_STATUS.arch||'').includes('x86')?`<div style="color:#e9a23b;font-size:12px;margin:8px 0 0">检测到 Intel 芯片 Mac：本地跑视觉大模型会很吃力，建议选「API」端（或先跳过）。</div>`:'';
    const oll=WIZ_STATUS.ollama_alive?`<span style="color:#7fc47f">● 已检测到本机 Ollama 正在运行</span>`:`<span class="muted">○ 未检测到本机 Ollama（<a href="https://ollama.com" target="_blank">去安装</a>，装好后点右侧刷新）</span>`;
    wizBox(`${wizDots(2)}
      <div style="text-align:center;font-size:17px;font-weight:800;margin-bottom:2px">给觅影接一个「看得懂画面」的 AI</div>
      <div class="muted" style="text-align:center;margin-bottom:12px">用来自动打标签、写描述。<b>不配也能用</b>：浏览、扫描、LUT、手动标签、按词搜索全都不受影响。</div>
      <div class="row" style="margin-bottom:6px;justify-content:space-between"><span>${oll}</span><button class="btn ghost" onclick="wizOpen()">刷新检测</button></div>
      <div class="row" style="align-items:stretch">${modelCardHTML('local',m)}${modelCardHTML('api',m)}</div>${intel}
      <div class="row" style="margin-top:8px"><button class="btn" onclick="testModel()">测试连接</button><span id="modelMsg" class="muted"></span></div>
      <div class="wizopt" onclick="wizShow(3)"><b>先不配，纯手动用</b><span class="muted">　以后随时到「设置」页补上，这里的选择不是一锤子买卖。</span></div>
      <div class="wizfoot"><button class="btn red" onclick="saveModel().then(()=>wizShow(3))">保存并继续</button><button class="btn" onclick="wizShow(1)">上一步</button></div>`)})}
  else{wizBox(`${wizDots(3)}
    <div style="text-align:center;font-size:17px;font-weight:800;margin-bottom:12px">三步上手</div>
    <img src="/web/guide/demo.gif" style="width:100%;border-radius:10px;border:1px solid var(--line);margin-bottom:12px" onerror="this.style.display='none'">
    <div class="pledge"><span class="ico">1</span><div><b>选一块盘或一个文件夹</b><span class="muted">「素材库」页会列出外挂硬盘和桌面，双击进入。</span></div></div>
    <div class="pledge"><span class="ico">2</span><div><b>快扫建底稿</b><span class="muted">勾选文件夹 →「快扫文件夹」：每个文件夹抽代表图生成缩略图并打标，快速建立可搜索的底稿；重点文件夹再用「扫描文件夹」精修。全程只读原文件。记住链路：先「生图」AI 才看得见画面，再「打标」才看得懂——之后人话搜索和 AI 调用才有的放矢。</span></div></div>
    <div class="pledge"><span class="ico">3</span><div><b>用人话找素材</b><span class="muted">顶栏「AI 找」输入「武汉 江边 日落 航拍」这种话，直接出结果；选中即可导出或在 ${FM} 显示。</span></div></div>
    <div style="text-align:center;margin-top:14px"><a class="btn" style="line-height:32px;min-width:130px;display:inline-block;text-decoration:none;margin-right:8px" href="/web/guide.html" title="从安装到导出，每一步都有图和演示动图；顶栏 ? 按钮随时可回来">图文使用说明</a><a class="btn" style="line-height:32px;min-width:130px;display:inline-block;text-decoration:none" href="https://yeehx.com/miying" target="_blank" title="玩椰的 3 分钟上手视频">▶ 3 分钟上手视频</a></div>
    <div class="wizfoot"><button class="btn red" onclick="wizFinish(true)">开始使用</button><button class="btn" onclick="wizShow(2)">上一步</button></div>`)}}
async function wizFinish(goScan){try{await jpost('/api/setup/done',{})}catch{}
  const w=$('#setupwiz');if(w)w.remove();
  if(goScan&&typeof folderStrategy==='function')folderStrategy('quick');}

let FM='Finder';
(async()=>{renderNav();await loadTags();await openFS('');setInterval(pollTasks,3000);pollTasks();
  jget('/api/health',null,true).then(h=>{if(h.file_manager)FM=h.file_manager;const b=document.querySelector('.brand small');if(b&&h.version){b.textContent='素材库 v'+h.version;b.style.cursor='pointer';b.title='关于觅影 / 使用说明';b.onclick=e=>{e.stopPropagation();openAbout()}}}).catch(()=>{});
  await maybeSetupWizard();checkAIGuide();maybeWelcome();setTimeout(()=>checkUpdate(false),2500);})();
</script>
</body>
</html>
