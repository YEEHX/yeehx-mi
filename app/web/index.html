<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">

<title>玩椰 YEEHX · 觅影</title>
<style>
/* ── 主题变量：调视觉只改这里（也是日后做浅色主题的开关位） ── */
:root{

  --muted-2:#777782;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
button,input,textarea,select{font:inherit}
button{cursor:pointer}.btn:disabled{opacity:.45;cursor:not-allowed}
a{color:#d46655;cursor:pointer;text-decoration:none}
.top{position:sticky;top:0;z-index:30;height:48px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px}
.top img{height:22px;cursor:pointer;transition:filter .15s}.top img:hover{filter:brightness(1.5)}.brand{font-weight:700;white-space:nowrap;cursor:pointer}.homebtn{display:inline-block;vertical-align:-2px;margin-left:7px;opacity:.6}.brand:hover .homebtn{opacity:1}.brand small{transition:color .15s}.brand small:hover{color:var(--text)}.brand small{color:#8d8d96;font-weight:400;margin-left:4px}
#q{width:min(340px,24vw);background:#0b0b0d;border:1px solid #2a2a31;border-radius:16px;color:var(--text);padding:7px 13px}
#q:focus{outline:none;border-color:var(--accent)}
#aiq{width:min(300px,22vw);background:#0b0b0d;border:1px solid #3a3220;border-radius:16px;color:var(--text);padding:7px 13px}
/* 顶栏防挤压：导航/按钮永不竖排换行，空间不够时优先收缩两个输入框 */
.top{overflow:hidden}
.nav{flex:0 0 auto}.nav button{white-space:nowrap}
.top .btn,.brand{white-space:nowrap;flex:0 0 auto}
#q,#aiq{flex:0 1 auto;min-width:110px}
@media (max-width:1500px){#q{width:230px}#aiq{width:210px}}
@media (max-width:1250px){#q{width:160px}#aiq{width:150px}.top .btn{min-width:auto;padding:0 8px}}
#aiq:focus{outline:none;border-color:var(--gold)}
#aiq.busy{border-color:var(--gold);animation:aipulse .9s infinite alternate}
@keyframes aipulse{from{opacity:.55}to{opacity:1}}
.model-card{flex:1;min-width:300px;border:1px solid var(--line-2);border-radius:8px;padding:10px 12px;background:var(--panel-2);cursor:pointer}
.model-card.on{border-color:var(--accent);background:#1d1411}
.model-card .field{margin:6px 0}
.nav{display:flex;gap:2px}.nav button{border:0;background:transparent;color:#999aa3;padding:6px 11px;border-radius:7px}.nav button.on{background:#202027;color:#fff}
.spacer{margin-left:auto}.btn{height:30px;min-width:68px;background:var(--panel-3);border:1px solid var(--line-2);color:#d9d9df;border-radius:7px;padding:0 8px}.btn:hover{border-color:var(--accent)}.btn.red{background:var(--accent-strong);border-color:var(--accent-strong);color:#fff}.btn.ghost{min-width:auto;background:transparent}.top .btn{min-width:88px}.barsep{width:1px;height:22px;background:var(--line-2);margin:0 5px}
#layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 48px)}
#side{border-right:1px solid #1d1d24;padding:10px 0 90px;overflow:auto;max-height:calc(100vh - 48px);position:sticky;top:48px}
#content{min-width:0}.bar{position:sticky;top:48px;z-index:20;background:#101013;border-bottom:1px solid #1d1d24;padding:7px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}.bar .btn{min-width:74px}.muted{color:var(--muted)}.wrap{padding:14px 16px 120px}
.crumbs{padding:7px 16px 0;color:#9a9aa3;font-size:12px;display:flex;gap:5px;flex-wrap:wrap}.sec{font-size:12px;color:var(--muted);margin:4px 0 10px}
.facet-head{padding:9px 12px 4px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}.facet{display:flex;justify-content:space-between;gap:8px;padding:4px 12px;cursor:pointer;border-left:2px solid transparent}.facet:hover{background:#17171d}.facet.on{background:var(--accent-dim);border-left-color:var(--accent)}.facet .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.facet .count{font-size:12px;color:var(--muted-2)}
.folders{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px}.folder{width:150px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px;position:relative;cursor:pointer}.folder:hover,.folder.sel{border-color:var(--accent)}.folder .cover,.folder .fic{width:100%;aspect-ratio:5/3;border-radius:6px;background:#101018;object-fit:cover;display:flex;align-items:center;justify-content:center;color:var(--folder)}.folder-icon{position:relative;width:56px;height:36px;border:2px solid var(--folder);border-radius:5px}.folder-icon:before{content:"";position:absolute;left:5px;top:-10px;width:22px;height:10px;border:2px solid var(--folder);border-bottom:0;border-radius:5px 5px 0 0;background:#101018}.folder .fn{margin-top:6px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.folder .fc{font-size:12px;color:var(--muted);min-height:18px}
.check{position:absolute;left:6px;top:6px;z-index:5;width:19px;height:19px;border:1px solid #6a6a74;border-radius:5px;background:#111118cc;color:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}.cell.sel>.check,.folder.sel>.check{background:#c04a3a;border-color:#c04a3a;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}.cell{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden;position:relative;display:flex;flex-direction:column}.thumbwrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#050506;cursor:pointer;flex:0 0 auto}.thumbwrap::before{content:"";position:absolute;inset:0;background:var(--bg) center/cover no-repeat;filter:blur(18px) brightness(.5);transform:scale(1.12)}.thumbfg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.cell:hover,.cell.sel{border-color:var(--accent)}.cell .noimg{width:100%;aspect-ratio:4/3;object-fit:cover;background:#050506;display:flex;align-items:center;justify-content:center;color:#777;cursor:pointer;flex:0 0 auto}.asset-icon{position:relative;width:46px;height:34px;border:2px solid #585866;border-radius:6px}.asset-icon:before{content:"";position:absolute;left:7px;bottom:7px;width:12px;height:12px;border-radius:50%;background:#585866}.asset-icon:after{content:"";position:absolute;right:7px;bottom:7px;width:18px;height:14px;background:#585866;clip-path:polygon(0 100%,45% 20%,70% 55%,100% 0,100% 100%)}.asset-icon.film{border-style:dashed}.cell .info{padding:7px;min-height:0;flex:1;overflow:hidden;display:flex;flex-direction:column}.cell .title{height:20px;line-height:20px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tags{display:flex;flex-wrap:wrap;gap:4px 6px;margin-top:5px}.cell .tags{height:38px;overflow:hidden}.tg{font-size:11px;line-height:16px;white-space:nowrap}.kind{position:absolute;right:6px;top:6px;background:var(--badge-bg);color:#9ab0d6;font-size:10px;padding:1px 6px;border-radius:8px}.status{position:absolute;right:6px;top:25px;background:var(--badge-bg);color:#a9b6c9;font-size:10px;padding:1px 6px;border-radius:8px}.score{height:18px;margin-top:2px;color:var(--gold);font-size:12px;line-height:18px}.score.score-empty{visibility:hidden}
.empty{padding:48px;color:var(--muted-2);text-align:center}
#credit{position:fixed;left:12px;bottom:9px;z-index:40;font-size:11px;color:var(--muted-2);cursor:pointer;opacity:.75;user-select:none}#credit:hover{color:var(--gold);opacity:1}
.drawer{position:fixed;right:0;top:48px;bottom:0;width:min(460px,96vw);background:var(--panel);border-left:1px solid var(--line-2);z-index:55;transform:translateX(102%);transition:.18s;display:flex;flex-direction:column}.drawer.on{transform:translateX(0)}.drawer .dh{min-height:48px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px;padding:8px 14px}.drawer .dh b{min-width:0;flex:1;line-height:20px;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.drawer .dh .btn{width:52px;min-width:52px;height:32px;padding:0;flex:0 0 auto}.drawer .db{padding:14px;overflow:auto}.drawer input,.drawer textarea,.drawer select{background:var(--bg);border:1px solid var(--line-2);color:#eee;border-radius:7px;padding:7px 9px}.drawer textarea{width:100%;min-height:72px}.heroimg{width:100%;border-radius:8px;background:#050506;object-fit:contain;max-height:260px}.field{margin:10px 0}.field label{display:block;color:#92929c;font-size:12px;margin-bottom:4px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:5px;background:#24242c;border:1px solid var(--line-2);border-radius:6px;padding:3px 8px;font-size:12px}.chip .x{color:#aaa;cursor:pointer}.chip .x:hover{color:#ff776b}
.tag-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.tag-toolbar input,.tag-toolbar select{height:34px;background:var(--bg);border:1px solid var(--line-2);border-radius:7px;color:#eee;padding:0 10px}.tag-section{margin-bottom:14px}.tag-section h3{font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:8px}.tag-count{font-size:11px;color:var(--muted-2)}.tag-list{display:flex;flex-wrap:wrap;gap:7px}.tag-words{display:flex;flex-wrap:wrap;gap:5px 6px;min-height:31px;padding:5px;border:1px solid transparent;border-radius:8px}.tag-words.drop{background:#261714;border-color:var(--accent)}.tag-empty{font-size:12px;color:#666872;line-height:24px}.tag-pill{height:24px;max-width:150px;display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line-2);background:#1a1a20;border-radius:6px;padding:0 7px;cursor:pointer;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag-pill.dragging{opacity:.45}.tag-pill.drop{border-color:var(--gold);background:#242012}.tag-pill small{color:var(--muted);font-size:10px}.tag-pill:hover,.tag-choice:hover{border-color:var(--accent)}.tag-choice{border:1px solid var(--line-2);background:#1a1a20;border-radius:7px;padding:5px 8px;cursor:pointer}.tag-choice.on{background:var(--accent-dim);border-color:var(--accent)}.star-rate{display:flex;align-items:center;gap:5px;flex-wrap:wrap}.star{width:34px;min-width:34px;height:32px;padding:0;border:1px solid var(--line-2);background:var(--panel-3);color:#666872;border-radius:7px;font-size:19px;line-height:1}.star.on{color:var(--gold);border-color:#7c6231;background:#2a2315}.star:hover{border-color:var(--accent);color:#f0c875}
.cand{display:flex;gap:12px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:9px}.cand .thumbs{display:flex;gap:4px}.cand img,.cand .ph{width:58px;height:44px;object-fit:cover;border-radius:5px;background:#101018;display:flex;align-items:center;justify-content:center;color:#777}.cand b{min-width:86px}.merge-card{display:grid;grid-template-columns:minmax(70px,1fr) 24px minmax(70px,1fr) auto;gap:7px 9px;align-items:center}.merge-card b{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.merge-reason{grid-column:1/-1;min-width:0;max-width:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.merge-actions{grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end}.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}.cat-card{border:1px solid var(--line-2);background:var(--panel-2);border-radius:8px;padding:10px;cursor:grab}.cat-card.dragging{opacity:.45}.cat-card.drop{border-color:var(--accent);background:#211712}.cat-card input[type=text]{width:130px}.cat-card input[type=color]{width:42px;height:32px;padding:0;border:0;background:transparent}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#25252c;border:1px solid var(--accent);border-radius:8px;padding:9px 16px;z-index:90;opacity:0;transition:.15s}.toast.on{opacity:1}.toast.ok{border-color:#3f8f5f}.toast.err{border-color:#d04438;background:#2c1b18}
#scanbox{position:fixed;right:14px;bottom:14px;width:350px;z-index:50;background:var(--panel);border:1px solid #303a5c;border-radius:8px;padding:10px;display:none;box-shadow:0 12px 36px #0008}.taskhead{display:flex;align-items:center;gap:8px}.taskline{margin-top:8px}.taskrow{display:grid;grid-template-columns:1fr 24px;gap:8px;align-items:center}.taskx{min-width:24px;width:24px;height:24px;padding:0;border-radius:5px}.progress{height:5px;background:#26262e;border-radius:3px;overflow:hidden;margin-top:3px}.progress i{display:block;height:100%;background:var(--accent)}
.pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}.pick{border:1px solid var(--line-2);background:var(--panel-2);border-radius:7px;padding:5px;cursor:pointer}.pick:hover{border-color:var(--accent)}.pick img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:5px;background:#050506}.pick div{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.cell{user-select:none}.cell.cursor{outline:2px solid var(--accent);outline-offset:-2px}.folder{user-select:none}
/* 质感：缩略图渐显 + hover 轻微放大投影；标题字阶上调一档 */
.cell img{opacity:0;transition:opacity .22s ease,transform .18s ease}.cell img.ld{opacity:1}
.cell:hover{box-shadow:0 6px 18px #0007}.cell:hover img.ld{transform:scale(1.03)}
.folder:hover{box-shadow:0 5px 14px #0006}
.drawer .dh b{font-size:15px}.tag-section h3{font-size:14px}.folder .fn{font-size:14.5px}
.empty{padding:56px 20px}.empty .folder-icon{opacity:.5}.empty-hint{font-size:12px;color:var(--muted);margin-top:8px}
#aibanner{display:flex;gap:10px;align-items:center;padding:8px 16px;background:#251a12;border-bottom:1px solid #4a3320;flex-wrap:wrap}
/* ── 首跑向导：全屏遮罩 + 居中卡片（服务端 setup_done 判定，换浏览器不重弹） ── */
#setupwiz{position:fixed;inset:0;z-index:90;background:#0d0d0fd9;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.wizcard{width:min(760px,94vw);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line-2);border-radius:12px;padding:26px 30px 22px}
.wizdots{display:flex;gap:6px;justify-content:center;margin-bottom:16px}.wizdots i{width:26px;height:4px;border-radius:2px;background:var(--line-2)}.wizdots i.on{background:var(--accent)}
.pledge{display:flex;gap:11px;align-items:flex-start;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:9px;text-align:left}
.pledge b{display:block;margin-bottom:2px}.pledge .ico{flex:0 0 auto;width:26px;height:26px;border-radius:7px;background:var(--accent-dim);color:#d46655;display:flex;align-items:center;justify-content:center;font-weight:800}
.wizopt{border:1px solid var(--line-2);border-radius:10px;padding:11px 14px;background:var(--panel-2);cursor:pointer;margin-top:10px}.wizopt:hover{border-color:var(--accent)}
.wizfoot{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}.wizfoot .btn{min-width:120px;height:34px}
.sec select{background:var(--bg);border:1px solid var(--line-2);color:var(--text);border-radius:7px;padding:4px 8px}
/* ── 手机适配（≤760px）：聚焦 搜索 / AI 找 / 浏览 / 大图 / 详情；
   批量操作、扫盘建库、标签分面是桌面工作流，手机上整组让位，不挤坏布局 ── */
@media (max-width:760px){
  .top{height:auto;flex-wrap:wrap;padding:8px 10px;gap:6px;row-gap:8px}
  .top img{display:none}
  #q,#aiq{flex:1 1 44%;width:auto;min-width:120px}
  .nav{order:6;width:100%;overflow-x:auto}
  .top>.btn{display:none}                  /* 快扫/扫描：建库在电脑上做 */
  #layout{grid-template-columns:1fr}
  #side{display:none}                      /* 分面默认收起，「筛选」按钮呼出 */
  body.side-open #side{display:block;position:fixed;inset:0;z-index:60;background:var(--bg);
    max-height:none;width:100vw;border-right:0;padding:12px 6px 130px;top:0}
  #filterFab{display:block;position:fixed;left:12px;bottom:14px;z-index:65;height:38px;
    border-radius:19px;padding:0 18px;box-shadow:0 6px 18px #000a}
  .bar{display:none}                       /* 批量操作工具条：桌面专用 */
  .wrap{padding:10px 10px 150px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .cell{height:200px}
  .folder{width:calc(50% - 5px)}
  .drawer{top:0;width:100vw;border-left:0}
  .lb-body img{max-width:calc(100vw - 96px)}
  #scanbox{left:10px;right:10px;width:auto;bottom:10px}
  #credit{display:none}
  .cat-grid{grid-template-columns:1fr}
  .model-card{min-width:0}
  .cand{flex-wrap:wrap}
}
#filterFab{display:none}
#lightbox{position:fixed;inset:0;background:#000000ea;z-index:80;display:none;flex-direction:column}#lightbox.on{display:flex}
.lb-top{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#101013cc}.lb-top b{max-width:40vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-body{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;min-height:0;padding:0 8px}
.lb-body img{max-width:calc(100vw - 120px);max-height:calc(100vh - 150px);object-fit:contain;border-radius:6px}
.lb-nav{width:44px;height:80px;background:var(--panel-3a);border:1px solid var(--line-2);color:#ddd;border-radius:8px;font-size:26px;cursor:pointer;flex:0 0 auto}.lb-nav:hover{border-color:var(--accent)}
.lb-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:8px 16px 14px}
.lb-stars{display:flex;align-items:center}.lb-star{font-size:20px;color:#555;cursor:pointer;padding:0 2px}.lb-star.on{color:var(--gold)}
</style>
</head>
<body>
<div class="top">
  <img src="/web/觅影-logo.png" onclick="extURL('https://www.yeehx.com')" onerror="this.style.display='none'">
  <div class="brand" onclick="openFS('')" title="回到素材库入口">觅影<span class="homebtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5.5 9.5V20h4.5v-5.5h4V20h4.5V9.5"/></svg></span><small>素材库</small></div>
  <input id="q" placeholder="搜索标签、别名、备注、文件名" title="普通搜索：按标签/别名/备注/文件名/AI 描述直接搜，快">
  <input id="aiq" placeholder="AI 找素材：一句话描述" title="自然语言找素材，可带范围和导出指令，如：在 02_视频 里找武当山雪景航拍，导出到桌面武当山备选。AI 只能找和导出（复制），永远不会动原始素材。要调模型，慢几秒；Esc 取消" onkeydown="if(isEnter(event)&&this.value.trim())doAISearch(this.value);else if(event.key==='Escape')cancelAISearch()">
  <div class="nav" id="nav"></div>
  <div class="spacer"></div>
  <button class="btn ghost" onclick="openAbout()" title="关于觅影：版本、快捷键、更新日志、作者" style="min-width:auto;padding:0 7px;font-size:12px;color:#a9a9b2">关于</button>
  <a class="btn" href="/web/guide.html" title="图文使用说明：从安装到导出，每一步都有图和演示动图" style="width:30px;min-width:30px;padding:0;border-radius:50%;text-align:center;line-height:28px;text-decoration:none;font-weight:800">?</a>
  <button class="btn" onclick="folderStrategy('quick')" title="每个文件夹只抽 2 张代表图生图+打标，快速建立可搜索底稿；适合整块盘第一次建库">快扫文件夹</button>
  <button class="btn" onclick="folderStrategy('full')" title="全部素材逐个生图+打标，耗时与数量成正比；适合重点文件夹精修">扫描文件夹</button>
</div>
<div id="layout">
  <aside id="side"></aside>
  <main id="content"><div class="bar" id="bar"></div><div class="crumbs" id="crumbs"></div><div class="wrap" id="main"></div></main>
</div>
<div id="credit" onclick="openAbout()" title="关于觅影 / 使用说明 / 关注玩椰">觅影 · 玩椰 YEEHX 出品</div>
<button id="filterFab" class="btn" onclick="toggleSideMobile()">筛选</button>
<div class="drawer" id="drawer"><div class="dh"><b id="drawerTitle"></b><button class="btn ghost" onclick="closeDrawer()">关闭</button></div><div class="db" id="drawerBody"></div></div>
<div id="scanbox"></div>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const attr=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const esc=s=>attr(String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"));   /* JS转义+HTML转义：路径里带 " 不再破坏 onclick */
const thumb=(f,v)=>f?('/thumbs/'+f+(v?('?v='+encodeURIComponent(v)):'')):'';
const baseName=p=>(String(p||'').split('/').filter(Boolean).pop()||p||'文件夹');
const toast=(t,type)=>{const e=$('#toast');e.textContent=t;e.className='toast on'+(type?' '+type:'');clearTimeout(e._t);e._t=setTimeout(()=>e.className='toast',2200);};
const emptyBox=(t,hint)=>`<div class="empty"><span class="folder-icon"></span><div style="margin-top:12px">${t}</div>${hint?`<div class="empty-hint">${hint}</div>`:''}</div>`;
function toggleSideMobile(){/* 手机：筛选按钮呼出/收起左侧分面面板（全屏层） */
  const side=$('#side');const b=$('#filterFab');
  if(!document.body.classList.contains('side-open')&&side&&!side.innerHTML.trim())return toast('当前页面没有可筛选的标签');
  const open=document.body.classList.toggle('side-open');
  if(b)b.textContent=open?'完成':'筛选'}
function coverFallback(img){img.outerHTML='<div class="fic"><span class="folder-icon"></span></div>';}   /* 封面 404 时回退文件夹图标，不再出现破图横框 */
function thumbFallback(img,aid,kind){img.outerHTML=`<div class="noimg" onclick="openAsset('${aid}')">${assetIcon(kind||'photo')}</div>`;}   /* 缩略图 404 时回退占位图标，不再空白卡 */
async function jget(u,p,quiet){const url=new URL(u,location.origin);if(p)Object.entries(p).forEach(([k,v])=>v!=null&&url.searchParams.set(k,v));const r=await fetch(url);if(!r.ok){let t=await r.text();try{const j=JSON.parse(t);t=j.error||j.detail||t}catch{}if(!quiet)toast('出错：'+String(t).slice(0,100),'err');throw new Error(t)}return r.json();}
async function jpost(u,b,m='POST'){const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b===undefined?undefined:JSON.stringify(b)});if(!r.ok){let t=await r.text();try{const j=JSON.parse(t);t=j.error||j.detail||t}catch{}toast('出错：'+String(t).slice(0,100),'err');throw new Error(t)}return r.json();}

let VIEW='fs',DIR='',VOL=null,REL='',FOLDER=null,Q='',FACETS={};
let shownA=[],shownF=[],selA=new Set(),selF=new Map();
let CATS=[],TAGS=[],TAGMAP={},CATMAP={};
let NAVSEQ=0,TASK_HINT_TIMER=null,TASK_COLLAPSED=true,TASK_LAST_ACTIVE=0,PENDING_ACTION=null,PICK_TAGS=new Set(),DRAG_TAG=null,DRAG_CAT=null,TAG_MERGE_SUGGESTIONS=[],PENDING_COUNT=0;
const NAV=[['fs','素材库'],['pending','待复核'],['tags','标签库'],['featured','精选库'],['settings','设置']];

function renderNav(){ $('#nav').innerHTML=NAV.map(([k,n])=>`<button class="${VIEW===k?'on':''}" onclick="go('${k}')">${n}<span id="nav-${k}"></span></button>`).join(''); }
// 中文输入法打长句按回车确认候选时，keydown 也是 Enter 但 isComposing=true——
// 不过滤就会"字还没打完就开始搜"（2026-07-06 真机反馈）。所有文本框的回车提交必须走这个判定。
function isEnter(e){return e.key==='Enter'&&!e.isComposing&&e.keyCode!==229}
function go(k){ closeDrawer(); if(k==='fs')return openFS(DIR||''); NAVSEQ++; VIEW=k; renderNav(); clearSel(); ({pending:renderPending,tags:renderTags,featured:renderFeatured,settings:renderSettings}[k])(); }
$('#q').addEventListener('keydown',e=>{if(isEnter(e)){AIQ={active:false,note:'',scope:null};SEARCH_SCOPE=null;Q=e.target.value.trim(); if(Q){doSearch()} else openFS(DIR||'')}});
/* 键盘：方向键移动光标，空格选中，回车看大图；lightbox 内 ←→ 翻页、1-5/0 打星、Esc 关闭 */
let CURSOR=-1;
const cells=()=>[...document.querySelectorAll('#main .cell')];
function gridCols(){const cs=cells();if(cs.length<2)return 1;const top=cs[0].offsetTop;let n=0;for(const c of cs){if(c.offsetTop!==top)break;n++}return Math.max(1,n)}
function setCursor(i){const cs=cells();if(!cs.length)return;CURSOR=Math.max(0,Math.min(cs.length-1,i));cs.forEach((c,j)=>c.classList.toggle('cursor',j===CURSOR));cs[CURSOR].scrollIntoView({block:'nearest'});}
document.addEventListener('keydown',e=>{const tag=(e.target&&e.target.tagName||'').toLowerCase();if(['input','textarea','select'].includes(tag))return;
  if(LB.open)return lbKey(e);
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){const cs=cells();if(!cs.length)return;e.preventDefault();const cols=gridCols();const d={ArrowLeft:-1,ArrowRight:1,ArrowUp:-cols,ArrowDown:cols}[e.key];setCursor(CURSOR<0?0:CURSOR+d);return}
  if(e.key===' '&&CURSOR>=0&&cells().length){e.preventDefault();const id=cells()[CURSOR]?.dataset.id;if(id)toggleA(id);return}
  if(e.key==='Enter'&&CURSOR>=0&&cells().length){const id=cells()[CURSOR]?.dataset.id;if(id)openLightboxById(id);return}
  if((e.key==='i'||e.key==='I')&&CURSOR>=0&&cells().length){const id=cells()[CURSOR]?.dataset.id;if(id)openAsset(id);return}
  if((e.key==='a'||e.key==='A')&&!e.metaKey&&!e.ctrlKey&&cells().length){e.preventDefault();shownA.forEach(x=>selA.add(x.asset_id));syncSel();toast(`已全选 ${shownA.length} 个素材`,'ok');return}
  if(e.key==='Escape'){if($('#drawer').classList.contains('on'))return closeDrawer();if(selA.size||selF.size){clearSel();syncSel();return}return}
  if(!/^[0-5]$/.test(e.key))return;
  if(selA.size||selF.size)return rateSelected(Number(e.key));
  // 无选中时：数字直接给焦点素材打星（同 lightbox 行为，不弹确认）
  if(CURSOR>=0&&cells().length){const id=cells()[CURSOR]?.dataset.id;if(id)cursorRate(id,Number(e.key));}});
async function cursorRate(id,score){await jpost('/api/asset/'+id+'/score',{score});
  const a=shownA.find(x=>x.asset_id===id);if(a)a.score=score;
  const sc=document.querySelector(`.cell[data-id="${id}"] .score`);if(sc){sc.textContent='★'.repeat(Math.min(5,score))||'★★★★★';sc.classList.toggle('score-empty',!score)}
  toast(score?`已打 ${score} 星`:'已取消星级','ok');}

async function loadTags(){const d=await jget('/api/tags');CATS=d.categories;TAGS=d.tags;TAGMAP={};CATMAP={};CATS.forEach(c=>CATMAP[c.id]=c);TAGS.forEach(t=>TAGMAP[t.id]=t);}
const tagName=id=>(TAGMAP[id]||{}).name||id;
const tagColor=t=>t.color||((CATMAP[t.category_id]||{}).color)||'#8b8b96';
const statusText=s=>({pending:'未打标',tagged:'已打标',ignored:'已忽略',failed:'打标失败'}[s]||s||'');

async function loadFacets(){
  const scope=(VIEW==='fs'&&VOL)?{volume_id:VOL,rel_path:REL}:{};
  const d=await jget('/api/facets',scope); renderSide(d.facets);
}
function renderSide(facets){
  let h='';
  for(const cat of CATS){const items=(facets.categories||{})[cat.name]||[]; if(!items.length)continue;
    h+=`<div class="facet-head" style="color:${cat.color}"><span>${attr(cat.name)}</span><span>${items.length}</span></div>`;
    items.slice(0,22).forEach(it=>{const on=(FACETS.tag||[]).includes(it.value);
      h+=`<div class="facet ${on?'on':''}" onclick="toggleFacet('tag','${it.value}')"><span class="name" style="color:${it.color||cat.color}">${attr(it.name)}</span><span class="count">${it.count}</span></div>`;});
  }
  for(const [k,label] of [['color','画面色'],['lut','LUT'],['status','打标'],['locked','其他']]){const items=facets[k]||[]; if(!items.length)continue;
    h+=`<div class="facet-head"><span>${label}</span></div>`+items.slice(0,16).map(it=>{const on=(FACETS[k]||[]).includes(it.value);const nm=k==='status'?statusText(it.value||it.name):it.name;return `<div class="facet ${on?'on':''}" onclick="toggleFacet('${k}','${esc(it.value)}')"><span class="name">${attr(nm)}</span><span class="count">${it.count}</span></div>`}).join('');
  }
  if(Object.keys(FACETS).length)h+=`<div style="padding:12px"><button class="btn" onclick="clearFacets()">清除筛选</button></div>`;
  $('#side').innerHTML=h||emptyBox('暂无可筛选标签','选中素材 → 生图 → 打标，标签会出现在这里');
}
function toggleFacet(k,v){const s=new Set(FACETS[k]||[]);s.has(v)?s.delete(v):s.add(v);FACETS[k]=[...s];if(!FACETS[k].length)delete FACETS[k];doSearch();}
function clearFacets(){FACETS={};Q='';$('#q').value='';AIQ={active:false,note:'',scope:null};SEARCH_SCOPE=null;openFS(DIR||'');}

async function openFS(dir){
  const seq=++NAVSEQ;
  VIEW='fs'; DIR=dir||''; renderNav(); clearSel();
  let d;
  try{d=await jget('/api/fs',dir?{dir}:{},true)}
  catch{toast('文件夹离线或不存在','err');return}
  if(seq!==NAVSEQ)return;
  VOL=d.volume_id||null; REL=d.rel_path||''; FOLDER=d.folder||null; shownA=d.assets||[]; shownF=(d.subdirs||[]).concat(d.roots||[]);
  $('#crumbs').innerHTML=(d.crumbs||[]).map((c,i)=>`<a onclick="openFS('${esc(c.path)}')">${attr(c.name)}</a>${i<d.crumbs.length-1?' / ':''}`).join('');
  let h='';
  if(!dir)h+=`<div class="sec">外挂硬盘 / 桌面入口</div><div class="folders">${(d.roots||[]).map(folderCard).join('')}</div>`;
  else{
    if(FOLDER)h+=folderHeader(FOLDER);
    else if(d.direct_media)h+=`<div class="sec" style="color:#e98a78">这个文件夹当前层有 ${d.direct_media} 个素材，正在轻量登记。</div>`;
    if(d.subdirs?.length)h+=`<div class="sec">文件夹 ${d.subdirs.length}</div><div class="folders">${d.subdirs.map(folderCard).join('')}</div>`;
    if(shownA.length)h+=`<div class="sec">素材 ${shownA.length}</div>${grid(shownA)}`;
    if(!d.subdirs?.length&&!shownA.length&&!d.direct_media)h+=emptyBox('这一层没有可识别的素材','支持 照片 / RAW / 视频 / RED / 工程包；被隐藏的文件夹不会出现在这里');
  }
  $('#main').innerHTML=h; renderBar();
  if(VOL&&(shownA.length||FOLDER||Object.keys(FACETS).length))await loadFacets();else renderSide({});
}
function folderHeader(f){const tags=(f.tags_resolved.common_tags||[]).map(t=>`<span class="chip" style="color:${t.color}">${attr(t.name)}<span class="x" onclick="removeCommonTag('${f.folder_id}','${t.id}','${esc(t.name)}')">×</span></span>`).join(' ');
  return `<div class="sec"><b style="color:#fff">共同标签：</b> ${tags||'<span class="muted">无共同标签</span>'}</div>`;}
function removeCommonTag(fid,tid,name){confirmAction('确认移除共同标签',[`将从当前文件夹及下级已有素材移除「${name}」标签。`,'如果这是当前文件夹继承标签，也会从当前文件夹层移除；不会修改原文件。'],'确认移除',async()=>{await jpost('/api/folder/'+fid+'/common_tag/'+tid,undefined,'DELETE');toast('已移除共同标签');openFS(DIR);});}
function folderCard(f){const key=f.folder_id||('path:'+f.path);const sel=selF.has(key);const cover=f.cover?`<img class="cover" src="${thumb(f.cover)}" onerror="coverFallback(this)">`:`<div class="fic"><span class="folder-icon"></span></div>`;
  const meta=[f.indexed>0?f.indexed+' 素材':'',f.direct_media>0?f.direct_media+' 当前层素材':'',f.child_dirs>0?f.child_dirs+' 子夹':''].filter(Boolean).join(' · ');
  return `<div class="folder ${sel?'sel':''}" data-key="${attr(key)}" ondblclick="openFS('${esc(f.path)}')">
    <div class="check" onclick="event.stopPropagation();toggleFolder('${esc(key)}','${esc(f.path)}','${f.folder_id||''}','${esc(f.name)}')">✓</div>${cover}
    <div class="fn">${attr(f.name)}</div><div class="fc">${meta}</div></div>`}
function grid(a){return `<div class="grid">${a.map(assetCard).join('')}</div>`}
function assetIcon(kind){return `<span class="asset-icon ${kind==='video'||kind==='film'?'film':''}"></span>`}
function assetCard(a){const sel=selA.has(a.asset_id);const title=(a.tags[0]||{}).name||a.name;const tags=a.tags.slice(0,7).map(t=>`<span class="tg" style="color:${t.color}">${attr(t.name)}</span>`).join('');
  const score=a.score?`<div class="score">${'★'.repeat(Math.min(5,a.score))}</div>`:`<div class="score score-empty">★★★★★</div>`;
  return `<div class="cell ${sel?'sel':''}" data-id="${a.asset_id}"><div class="check" onclick="toggleA('${a.asset_id}',event)">✓</div><span class="kind">${a.kind}</span><span class="status">${statusText(a.status)}</span>
    ${a.thumb?`<div class="thumbwrap" style="--bg:url('${thumb(a.thumb,a.thumb_v)}')" onclick="openLightboxById('${a.asset_id}')" title="点击看大图"><img class="thumbfg" loading="lazy" src="${thumb(a.thumb,a.thumb_v)}" onload="this.classList.add('ld')" onerror="thumbFallback(this,'${a.asset_id}','${a.kind}')"></div>`:`<div class="noimg" onclick="openAsset('${a.asset_id}')">${assetIcon(a.kind)}</div>`}
    <div class="info" onclick="openAsset('${a.asset_id}')" style="cursor:pointer" title="点击看详情"><div class="title">${attr(title)}</div>${score}<div class="tags">${tags}</div></div></div>`}

function renderBar(){const n=selA.size+selF.size,hasSel=n>0,hasA=selA.size>0,hasF=selF.size>0,onlyF=hasF&&!hasA;
  const b=(label,fn,on,tip)=>`<button class="btn" ${on?'':'disabled'} title="${attr(on?tip:('先选中'+(label==='隐藏'||label==='同步'?'文件夹（不能混选素材）':'素材或文件夹')))}" onclick="${fn}">${label}</button>`;
  $('#bar').innerHTML=`
  <button class="btn" onclick="selectAssets()" title="选中当前列表的全部素材">选本页素材</button><button class="btn" onclick="selectAll()" title="素材和文件夹全部选中">全选</button>${b('清空','clearSel()',hasSel,'取消所有选中')}<span class="barsep"></span>
  ${b('标签','openTagPicker()',hasSel,'给选中对象挂标签；挂在文件夹上=下级素材继承')}${b('生图','actThumbs()',hasSel,'生成/重生成缩略图（不动原文件）')}${b('打标','actFine()',hasSel,'AI 按画面+路径+元数据挂标签；只处理有缩略图的；已打标的也会重打（只想补漏用「同步」）')}${b('LUT','openLutPicker()',hasSel,'选 LUT 重生成缩略图预览（不动原片）')}${b('打星','openScorePicker()',hasSel,'1-5 星，进精选库；快捷键 1-5/0')}<span class="barsep"></span>
  ${b('下载','actDownload()',hasA||hasF,'单选=下载代表帧；多选/文件夹=打包 zip（≤40 帧）')}${b('导出','openExport()',hasA||hasF,'复制原素材 / 导出图片帧 / 生成清单（支持文件夹）')}<span class="barsep"></span>
  ${b('清除','actClear()',hasSel,'清掉打标数据（标签/AI描述），可选连缩略图一起清；锁定素材跳过')}${b('隐藏','actHide()',onlyF,'隐藏后快扫/生图/打标都绕过这个文件夹')}${b('锁定','actLock()',hasSel,'锁定防误改 / 解除锁定；左侧分面「已锁定」可筛出全部')}${b('删除','actDelete()',hasSel,'只删觅影库记录和缩略图，不删原文件')}${b('同步','actSync()',onlyF,'让库追上硬盘：新增入库+生图+只补未打标的；已消失文件清记录（盘在线时）')}
  <span class="muted" style="margin-left:auto">已选 ${n} · ${shownA.length} 素材${shownF.length?' · '+shownF.length+' 文件夹':''}</span>`;}
let LAST_A_INDEX=-1;
function toggleA(id,ev){const idx=shownA.findIndex(x=>x.asset_id===id);
  if(ev&&ev.shiftKey&&LAST_A_INDEX>=0&&idx>=0){const lo=Math.min(LAST_A_INDEX,idx),hi=Math.max(LAST_A_INDEX,idx);const adding=!selA.has(id);
    for(let i=lo;i<=hi;i++){adding?selA.add(shownA[i].asset_id):selA.delete(shownA[i].asset_id)}
    LAST_A_INDEX=idx;syncSel();return}
  selA.has(id)?selA.delete(id):selA.add(id);if(idx>=0)LAST_A_INDEX=idx;syncSel();}
function toggleFolder(key,path,fid,name){selF.has(key)?selF.delete(key):selF.set(key,fid?{type:'folder',id:fid,path,name}:{type:'path',path,name:name||baseName(path)});syncSel();}
function selectAssets(){shownA.forEach(a=>selA.add(a.asset_id));syncSel();}
function selectAll(){selectAssets();shownF.forEach(f=>selF.set(f.folder_id||('path:'+f.path),f.folder_id?{type:'folder',id:f.folder_id,path:f.path,name:f.name}:{type:'path',path:f.path,name:f.name}));syncSel();}
function clearSel(){selA.clear();selF.clear();syncSel();}
function targets(){return [...selF.values()].concat([...selA].map(id=>{const a=shownA.find(x=>x.asset_id===id)||{};return {type:'asset',id,name:a.name||id,thumb:a.thumb||''}}));}
function syncSel(){document.querySelectorAll('.cell').forEach(c=>c.classList.toggle('sel',selA.has(c.dataset.id)));document.querySelectorAll('.folder').forEach(c=>c.classList.toggle('sel',selF.has(c.dataset.key)));renderBar();}
function hasUnimportedPath(){return targets().some(t=>t.type==='path')}
function objectSummary(ts=targets()){const names=ts.map(t=>t.name||baseName(t.path)||t.id);const preview=names.slice(0,6).join('、');return `${ts.length} 个对象${preview?'：'+preview:''}${names.length>6?' 等':''}`;}
function tagTargetSummary(ts=targets(),names=[]){const folders=ts.filter(t=>t.type==='folder'||t.type==='path');const assets=ts.filter(t=>t.type==='asset');const tagTxt=names.length?`：${names.join('、')}`:'';const lines=[];if(folders.length)lines.push(`给 ${objectSummary(folders)} 及其所有下级素材继承标签${tagTxt}`);if(assets.length)lines.push(`给 ${objectSummary(assets)} 直接加标签${tagTxt}`);return lines;}
function selectedFolderTargets(){return [...selF.values()];}
function confirmAction(title,lines,okText,fn,red=true){PENDING_ACTION=fn;openDrawer(title,`<div class="field">${lines.map(x=>`<p style="margin-bottom:8px">${attr(x)}</p>`).join('')}</div><div class="row"><button class="btn ${red?'red':''}" onclick="runPendingAction()">${attr(okText)}</button><button class="btn" onclick="closeDrawer()">取消</button></div>`)}
async function runPendingAction(){const fn=PENDING_ACTION;PENDING_ACTION=null;closeDrawer();if(fn)await fn().catch(()=>{});}

async function openTagPicker(){
  await loadTags(); PICK_TAGS=new Set(); const noTarget=!targets().length;
  let h=noTarget?'<div class="sec" style="color:#e98a78">没有选中对象，只能查看标签，不能应用。</div>':'<div class="sec">选择要加到当前选中对象的标签。</div>';
  for(const cat of CATS){const list=TAGS.filter(t=>t.category===cat.name);if(!list.length)continue;
    h+=`<div class="tag-section"><h3 style="color:${cat.color}">${attr(cat.name)}</h3><div class="tag-list">${list.map(t=>`<span class="tag-choice" data-id="${t.id}" onclick="togglePickTag('${t.id}')" style="color:${tagColor(t)}">${attr(t.name)}</span>`).join('')}</div></div>`;
  }
  h+=`<div class="row" style="position:sticky;bottom:0;background:var(--panel);padding-top:10px"><button id="tagApplyBtn" class="btn red" onclick="prepareTagConfirm()" disabled>确定</button><button class="btn" onclick="closeDrawer()">关闭</button></div>`;
  openDrawer('标签',h); updateTagPickerState();
}
function togglePickTag(id){PICK_TAGS.has(id)?PICK_TAGS.delete(id):PICK_TAGS.add(id);updateTagPickerState();}
function updateTagPickerState(){document.querySelectorAll('.tag-choice').forEach(e=>e.classList.toggle('on',PICK_TAGS.has(e.dataset.id)));const b=$('#tagApplyBtn');if(b)b.disabled=!targets().length||!PICK_TAGS.size;}
function prepareTagConfirm(){const ids=[...PICK_TAGS];if(!targets().length||!ids.length)return;const names=ids.map(tagName);confirmAction('确认标签',tagTargetSummary(targets(),names).concat(['只修改觅影里的标签记录，不会修改原文件。']),'确认加标签',async()=>{await jpost('/api/apply',{targets:targets(),op:'add_tags',tag_ids:ids});toast('已加标签');refresh();});}

function folderStrategy(mode){
  if(selA.size)return toast(`${mode==='full'?'扫描文件夹':'快扫文件夹'}只支持文件夹，请只选择文件夹`);
  const fs=selectedFolderTargets();
  if(fs.length)return confirmFolderStrategy(mode,fs);
  chooseFolderStrategy(mode);
}
async function chooseFolderStrategy(mode){
  try{const r=await jget('/api/dialog/folder');confirmFolderStrategy(mode,[{type:'path',path:r.path,name:baseName(r.path)}],true)}
  catch{openDrawer('手动选择文件夹',`<div class="field"><label>文件夹绝对路径</label><input id="manualPath" style="width:100%" placeholder="/Volumes/..."></div><button class="btn red" onclick="manualFolderStrategy('${mode}')">继续</button>`)}
}
async function manualFolderStrategy(mode){const p=$('#manualPath').value.trim();if(!p)return;confirmFolderStrategy(mode,[{type:'path',path:p,name:baseName(p)}],true);}
function confirmFolderStrategy(mode,fs,chosen=false){
  const title=mode==='full'?'扫描文件夹':'快扫文件夹';
  const desc=mode==='full'
    ?'做什么：登记全部素材 → 缺缩略图的生成缩略图 → 给未打标/失败的逐一 AI 打标（已打标的不重打，可放心重复跑）。耗时和素材数量成正比，适合重点文件夹精细整理。'
    :'做什么：登记全部素材，但每个文件夹只抽 2 张代表图生成缩略图并打标（已打标的不重打），几分钟建立起可搜索的底稿。适合整块硬盘第一次建库；之后想精修哪个文件夹再「扫描」它。';
  confirmAction(`确认${title}`,[`将处理 ${objectSummary(fs)}。`,desc,'全程只读原文件，登记/缩略图/标签都写在觅影自己的数据目录。'],`确认${title}`,async()=>{
    if(chosen)await jpost('/api/scan/quick_import',{root_path:fs[0].path,mode:mode==='full'?'full':'quick'});
    else await jpost('/api/apply',{targets:fs,op:mode==='full'?'full_scan':'scan'});
    showTaskHint(`${title}任务已排队`);setTimeout(()=>openFS(DIR),700);
  });
}

/* 下载统一走隐藏锚点：不整页跳转（location.href 在独立窗口壳里会因 WKWebView 不接管下载而直接关窗退出），出错也不会把界面替换成 JSON */
function dlURL(u){const a=document.createElement('a');a.href=u;a.download='';document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),2000)}
/* 外链统一走锚点：window.open 在独立窗口壳里是空操作；锚点 target=_blank 会被壳转给系统浏览器 */
function extURL(u){const a=document.createElement('a');a.href=u;a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),1000)}
/* 复制统一带回退：WKWebView 里 navigator.clipboard 可能不可用 */
function copyText(t,msg){const done=()=>toast(msg||'已复制','ok');
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>{_copyFallback(t);done()})}
  else{_copyFallback(t);done()}}
function _copyFallback(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch{}ta.remove()}
function actDownload(){if(!targets().length)return toast('请选择要下载的素材或文件夹');
  if(selA.size===1&&!selF.size){dlURL('/api/asset/'+[...selA][0]+'/download');toast('已开始下载','ok');return}
  confirmAction('确认批量下载',[`将抽取 ${objectSummary()} 内全部素材的代表帧（原分辨率、含 LUT），打包成 zip 下载。`,'一次最多 40 帧，超出会提示改用「导出 → 图片/帧」。','生成需要一点时间，开始后请等浏览器弹出下载。'],'开始打包',async()=>{
    toast('正在生成 zip，请稍候…');
    const r=await fetch('/api/assets/download_zip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({targets:targets()})});
    if(!r.ok){let t=await r.text();try{const j=JSON.parse(t);t=j.error||j.detail||t}catch{}return toast('打包失败：'+String(t).slice(0,80),'err')}
    const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    let fn='觅影帧.zip';const cd=r.headers.get('content-disposition')||'';const m=cd.match(/filename\*?=(?:UTF-8'')?"?([^";]+)/);if(m)try{fn=decodeURIComponent(m[1])}catch{fn=m[1]}
    a.download=fn;a.click();URL.revokeObjectURL(a.href);
    const failed=Number(r.headers.get('x-frames-failed')||0);toast(failed?`已下载，${failed} 个抽帧失败被跳过`:'已开始下载','ok');
  },false);}
function refresh(){if(VIEW==='search')doSearch();else if(VIEW==='featured')renderFeatured();else if(VIEW==='fs')openFS(DIR);}

let SEARCH_OFFSET=0,SEARCH_TOTAL=0,SEARCH_SORT='default',SEARCH_BUSY=false,SEARCH_SCOPE=null;const SEARCH_PAGE=120;
/* ── AI 自然语言指令：解析 范围+条件+动作 → 搜索；导出只是"提议"，确认后才执行（且只会复制） ── */
let AIQ={active:false,note:'',scope:null},AIQ_CTRL=null;
function cancelAISearch(){if(AIQ_CTRL){AIQ_CTRL.abort();AIQ_CTRL=null;toast('已取消 AI 解析')}const b=$('#aiq');if(b){b.classList.remove('busy');b.placeholder='AI 找素材：一句话描述'}}
async function doAISearch(q,follow=false){q=(q||'').trim();if(!q)return;
  if(AIQ_CTRL)AIQ_CTRL.abort();
  AIQ_CTRL=new AbortController();
  const box=$('#aiq');if(box){box.classList.add('busy');box.placeholder='AI 解析中… Esc 取消'}
  let d;
  try{
    const r=await fetch('/api/ai_search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q,base_tag_ids:follow?(FACETS.tag||[]):[],scope:follow?AIQ.scope:undefined}),signal:AIQ_CTRL.signal});
    if(!r.ok){let t=await r.text();try{const j=JSON.parse(t);t=j.error||j.detail||t}catch{}throw new Error(t)}
    d=await r.json();
  }catch(e){if(e.name!=='AbortError')toast('AI 解析失败：'+String(e.message||e).slice(0,90),'err');return}
  finally{AIQ_CTRL=null;if(box){box.classList.remove('busy');box.placeholder='AI 找素材：一句话描述'}}
  const p=d.parsed||{};
  if(d.degraded){/* 模型不可用：后端已自动回退普通搜索，这里只提示+渲染 */
    AIQ.active=true;AIQ.note='';AIQ.scope=null;SEARCH_SCOPE=null;
    Q=p.keywords||q;$('#q').value=Q;if(!follow&&box)box.value='';
    await doSearch(true);
    toast('AI 没连上，已用普通关键词搜索（'+String(d.degraded_reason||'').slice(0,70)+'）——到「设置」检查模型配置，点「测试连接」通过即自动保存','err');
    return}
  AIQ.active=true;AIQ.note=p.note||'';AIQ.scope=p.scope||null;SEARCH_SCOPE=AIQ.scope?{volume_id:AIQ.scope.volume_id,rel_path:AIQ.scope.rel_path}:null;
  const ids=p.tag_ids||[];
  if(ids.length)FACETS={...FACETS,tag:ids};else delete FACETS.tag;
  Q=p.keywords||'';$('#q').value=Q;
  if(!follow&&box)box.value='';
  await doSearch(true);
  const names=(p.tags||[]).filter(Boolean);
  toast(`AI 解析：${AIQ.scope?'范围 '+AIQ.scope.label+'；':''}${names.length?'标签 '+names.join('、'):'没匹配到标签'}${Q?' + 关键词「'+Q+'」':''}`,'ok');
  if(p.action==='export'){
    if(!d.total)return toast('没有命中素材，先调整条件再导出','err');
    aiExportConfirm(d);
  }
}
/* AI 导出确认：明确告知只会复制；目标可改可选 */
function aiExportConfirm(d){const p=d.parsed||{};const exp=p.export||{};const typeName={original:'复制原素材',image:'导出图片/帧',manifest:'生成清单'}[exp.type]||'复制原素材';
  window._AIEXP={tag_ids:p.tag_ids||[],keywords:p.keywords||'',scope:p.scope||null,type:exp.type||'original',total:d.total};
  openDrawer('确认 AI 导出',`<div class="field">
    <p style="margin-bottom:6px"><b>AI 理解：</b>${attr(p.note||'')}</p>
    <p style="margin-bottom:6px">范围：${attr(p.scope?p.scope.label:'全库')}${p.scope_alternates?`<span class="muted">（另有 ${p.scope_alternates} 个相似文件夹，如不对请说得更具体）</span>`:''}</p>
    <p style="margin-bottom:6px">条件：${(p.tags||[]).filter(Boolean).map(x=>attr(x)).join('、')||'无标签'}${p.keywords?' + 关键词「'+attr(p.keywords)+'」':''}</p>
    <p style="margin-bottom:6px">命中 <b>${d.total}</b> 条 · 方式：${typeName}</p>
    ${p.scope&&p.scope.online===false?'<p style="color:#e9a23b;margin-bottom:6px">⚠ 该范围所在的盘当前离线，导出会失败，请先挂载硬盘。</p>':''}
    <div class="field"><label>导出到（只往这个文件夹写新文件；原始素材只读，绝不移动/删除/修改）</label><div class="row"><input id="aiExpTarget" style="flex:1;min-width:240px" value="${attr(exp.target||'')}" placeholder="点「选择」或输入绝对路径，支持 ~ 开头"><button class="btn" onclick="pickAIExportTarget()">选择</button></div><div class="muted" style="font-size:12px;margin-top:4px">提示：目标若选在已索引的素材盘里，下次扫描会把导出件登记成新素材（重复检测会标出来）。</div></div>
  </div><div class="row"><button class="btn red" onclick="runAIExport()">确认导出 ${d.total} 条</button><button class="btn ghost" onclick="closeDrawer()">取消</button></div>`);}
async function pickAIExportTarget(){const r=await jget('/api/dialog/export_folder');const i=$('#aiExpTarget');if(i)i.value=r.path;}
async function runAIExport(){const t=($('#aiExpTarget')||{value:''}).value.trim();if(!t)return toast('请选择或填写导出目标文件夹');const e=window._AIEXP||{};const r=await jpost('/api/ai_export',{tag_ids:e.tag_ids,keywords:e.keywords,scope:e.scope,type:e.type,target:t});closeDrawer();showTaskHint(`AI 导出已排队：${r.count} 个素材（复制，不动原素材）`);}
function dropAIScope(){AIQ.scope=null;SEARCH_SCOPE=null;doSearch(true);}
async function doSearch(reset=true){VIEW='search';renderNav();if(reset){clearSel();SEARCH_OFFSET=0;shownA=[];$('#crumbs').innerHTML=''}
  if(SEARCH_BUSY)return;SEARCH_BUSY=true;let res;
  try{res=await jpost('/api/search',{q:Q,facets:FACETS,scope:SEARCH_SCOPE||undefined,limit:SEARCH_PAGE,offset:SEARCH_OFFSET,sort:SEARCH_SORT,with_facets:SEARCH_OFFSET===0})}finally{SEARCH_BUSY=false}
  if(res.fts_degraded&&!window._FTSWARN){window._FTSWARN=1;toast('全文索引异常，已自动退回普通匹配；重启觅影可尝试重建索引','err')}
  SEARCH_TOTAL=res.total;shownF=[];const fresh=res.assets||[];shownA=shownA.concat(fresh);SEARCH_OFFSET=shownA.length;
  if(res.facets)renderSide(res.facets);
  if(!reset&&$('#main .grid')){const g=$('#main .grid');fresh.forEach(a=>g.insertAdjacentHTML('beforeend',assetCard(a)));const mb=$('#moreBtn');if(mb){if(shownA.length>=SEARCH_TOTAL)mb.parentElement.remove();else mb.textContent=`加载更多（已显示 ${shownA.length}/${SEARCH_TOTAL}）`}renderBar();return}
  renderSearchPage();}
function renderSearchPage(){const chips=Object.entries(FACETS).flatMap(([k,vs])=>vs.map(v=>`<span class="chip">${k==='tag'?tagName(v):(k==='locked'?'已锁定':attr(v))} <span class="x" onclick="toggleFacet('${k}','${esc(v)}')">×</span></span>`)).join(' ');
  const sortSel=`<select id="sortSel" onchange="setSort(this.value)">${[['default','默认排序'],['mtime','最新拍摄'],['mtime_asc','最早拍摄'],['score','星级优先'],['size','文件大小'],['name','名称']].map(([v,n])=>`<option value="${v}" ${SEARCH_SORT===v?'selected':''}>${n}</option>`).join('')}</select>`;
  const aiLine=AIQ.active?`<div class="sec" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="chip" style="color:var(--gold)" title="${attr(AIQ.note||'')}">AI 理解：${attr(AIQ.note||'已解析为上方标签组合')}</span>${AIQ.scope?`<span class="chip" title="只在这个范围内搜索">范围：${attr(AIQ.scope.label)} <span class="x" onclick="dropAIScope()">×</span></span>`:''}<input id="aiFollow" placeholder="继续补充条件，回车（如：只要晴天的 / 导出到桌面xx文件夹）" style="flex:1;min-width:220px;background:var(--bg);border:1px solid var(--line-2);border-radius:7px;color:var(--text);padding:5px 9px" onkeydown="if(isEnter(event)&&this.value.trim())doAISearch(this.value,true)"></div>`:'';
  const more=shownA.length<SEARCH_TOTAL?`<div style="text-align:center;padding:18px"><button class="btn" id="moreBtn" onclick="doSearch(false)">加载更多（已显示 ${shownA.length}/${SEARCH_TOTAL}）</button></div>`:'';
  $('#main').innerHTML=`<div class="sec" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><span>${Q?'搜索 '+attr(Q):'筛选'} · ${SEARCH_TOTAL} 条</span>${sortSel}${chips}</div>`+aiLine+grid(shownA)+more;renderBar();}
function setSort(v){SEARCH_SORT=v;doSearch(true);}
window.addEventListener('scroll',()=>{if(VIEW!=='search'||SEARCH_BUSY)return;if(!SEARCH_TOTAL||shownA.length>=SEARCH_TOTAL)return;if(window.innerHeight+window.scrollY>=document.body.offsetHeight-600)doSearch(false);});

function assetDetailHTML(d){const tags=d.effective.tags.map(t=>`<span class="chip" style="color:${t.color}">${attr(t.name)}<span class="x" onclick="removeAssetTag('${d.asset_id}','${t.id}')">×</span></span>`).join('');

/* ── 换一帧：从视频均匀抽候选帧，选一张做封面（写回 rep_ts，下载/导出自动跟随）── */
function reframeFmt(s){s=Math.max(0,s||0);const m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+String(x).padStart(2,'0');}
async function openReframe(aid){
  openDrawer('换一帧','<div class="sec muted">正在抽取候选帧…视频较长或 RED 素材会慢一点。</div>');
  let d;try{d=await jget('/api/asset/'+aid+'/frame_candidates',{n:12});}catch(e){openAsset(aid);return;}
  const cur=d.current_ts;
  const cells=(d.candidates||[]).map(c=>{const on=(cur!=null&&Math.abs(c.ts-cur)<0.05);
    return `<div onclick="pickFrame('${aid}',${c.ts})" title="第 ${reframeFmt(c.ts)} 处${on?' · 当前帧':''}" style="position:relative;cursor:pointer;border:2px solid ${on?'var(--gold)':'transparent'};border-radius:6px;overflow:hidden">
      <img src="${c.url}?t=${Date.now()}" loading="lazy" style="width:100%;display:block;aspect-ratio:16/10;object-fit:cover">
      <span style="position:absolute;left:4px;bottom:4px;background:#000a;color:#fff;font-size:11px;padding:1px 5px;border-radius:4px">${reframeFmt(c.ts)}${on?' ·当前':''}</span></div>`;}).join('');
  openDrawer('换一帧',`<div class="sec muted">点一张满意的做封面。选定后下载/导出都会用这一帧；不选点「取消」即丢弃候选。</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${cells}</div>
    <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="cancelReframe('${aid}')">取消</button></div>`);
}
async function pickFrame(aid,ts){await jpost('/api/asset/'+aid+'/reframe',{ts});toast('封面已更新（下载/导出将用这一帧）','ok');openAsset(aid);refresh();}
async function cancelReframe(aid){try{await jpost('/api/asset/'+aid+'/frame_candidates/clear',{});}catch(e){}openAsset(aid);}

/* ── 全屏 lightbox：选片流程（←→ 翻页、1-5/0 打星、详情、Esc） ── */
let LB={open:false,idx:-1};
const lbList=()=>shownA.filter(a=>a.thumb);
function openLightboxById(id){const i=lbList().findIndex(a=>a.asset_id===id);if(i<0)return toast('这个素材还没有缩略图，先生图');openLightbox(i);}
function openLightbox(i){const list=lbList();if(!list.length)return;LB.open=true;LB.idx=(i+list.length)%list.length;const a=list[LB.idx];
  let el=$('#lightbox');if(!el){el=document.createElement('div');el.id='lightbox';document.body.appendChild(el);el.addEventListener('click',ev=>{if(ev.target===el||ev.target.classList.contains('lb-body'))closeLightbox()});}
  el.innerHTML=`<div class="lb-top"><b title="${attr(a.name)}">${attr(a.name)}</b><span class="muted">${LB.idx+1}/${list.length} · ${a.kind}</span><div class="spacer"></div>
    <div class="lb-stars">${[1,2,3,4,5].map(n=>`<span class="lb-star ${a.score>=n?'on':''}" onclick="lbRate(${n})">★</span>`).join('')}<span class="muted" style="margin-left:8px;font-size:12px">1-5 打星 · 0 取消 · ←→ 翻页</span></div>
    <button class="btn" onclick="lbDetail()">详情</button><button class="btn" onclick="closeLightbox()">关闭</button></div>
  <div class="lb-body"><button class="lb-nav" onclick="lbStep(-1)">‹</button><img src="${thumb(a.thumb,a.thumb_v)}"><button class="lb-nav" onclick="lbStep(1)">›</button></div>
  <div class="lb-tags">${(a.tags||[]).slice(0,12).map(t=>`<span class="tg" style="color:${t.color}">${attr(t.name)}</span>`).join('')||''}</div>`;
  el.classList.add('on');document.body.style.overflow='hidden';}
function closeLightbox(){LB.open=false;const el=$('#lightbox');if(el)el.classList.remove('on');document.body.style.overflow='';}
function lbStep(d){openLightbox(LB.idx+d);}
function lbDetail(){const a=lbList()[LB.idx];if(a){closeLightbox();openAsset(a.asset_id);}}
async function lbRate(score){const a=lbList()[LB.idx];if(!a)return;await jpost('/api/asset/'+a.asset_id+'/score',{score});a.score=score;openLightbox(LB.idx);
  const sc=document.querySelector(`.cell[data-id="${a.asset_id}"] .score`);if(sc){sc.textContent='★'.repeat(Math.min(5,score))||'★★★★★';sc.classList.toggle('score-empty',!score)}
  toast(score?`已打 ${score} 星`:'已取消星级','ok');}
function lbKey(e){if(e.key==='Escape')return closeLightbox();if(e.key==='ArrowLeft'){e.preventDefault();return lbStep(-1)}if(e.key==='ArrowRight'){e.preventDefault();return lbStep(1)}if(/^[0-5]$/.test(e.key))lbRate(Number(e.key));}
async function setAssetScore(aid,score){await jpost('/api/asset/'+aid+'/score',{score});toast('已更新星级');openAsset(aid);refresh();}

async function renderTags(){await loadTags();$('#side').innerHTML='';$('#bar').innerHTML='';$('#crumbs').innerHTML='';let h=`<div class="tag-toolbar"><input id="newTagName" placeholder="新标签"><select id="newTagCat">${CATS.map(c=>`<option>${attr(c.name)}</option>`).join('')}</select><button class="btn red" onclick="createTag()">新建</button><button class="btn" onclick="runTagMergeAI()" title="AI 找同义/重复标签给合并建议">AI 整理标签</button><button class="btn" onclick="showTagMergeSuggestions()">合并建议</button><button class="btn" onclick="openPrune()" title="列出几乎没用过的标签，批量删除——治理已经膨胀的存量">低频瘦身</button></div>`;
  for(const cat of CATS){const list=TAGS.filter(t=>t.category===cat.name);h+=`<div class="tag-section"><h3 style="color:${cat.color}">${attr(cat.name)} <span class="tag-count">${list.length}</span></h3><div class="tag-words" data-cat="${attr(cat.name)}" ondragover="tagDragOver(event)" ondragleave="tagDragLeave(event)" ondrop="tagDrop(event,'${esc(cat.name)}')">${list.length?list.map(tagBlock).join(''):'<span class="tag-empty">空</span>'}</div></div>`}
  $('#main').innerHTML=h||'<div class="empty">暂无标签</div>';
}
function tagBlock(t){const meta=[t.refs?.length?`图${t.refs.length}`:'',t.aliases?.length?'别':''].filter(Boolean).join(' ');return `<span class="tag-pill" draggable="true" data-id="${t.id}" title="${attr(t.name)}${meta?' · '+attr(meta):''}" style="color:${tagColor(t)}" onclick="openTag('${t.id}')" ondragstart="tagDragStart(event,'${t.id}')" ondragend="tagDragEnd(event)" ondragover="tagPillDragOver(event,'${t.id}')" ondragleave="tagPillDragLeave(event)" ondrop="tagPillDrop(event,'${t.id}')"><span>${attr(t.name)}</span>${meta?`<small>${attr(meta)}</small>`:''}</span>`}
function tagDragStart(e,id){DRAG_TAG=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);e.currentTarget.classList.add('dragging');}
function tagDragEnd(e){DRAG_TAG=null;e.currentTarget.classList.remove('dragging');document.querySelectorAll('.tag-words.drop,.tag-pill.drop').forEach(x=>x.classList.remove('drop'));}
function tagDragOver(e){e.preventDefault();e.currentTarget.classList.add('drop');}
function tagDragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drop');}
function tagDrop(e,cat){e.preventDefault();e.currentTarget.classList.remove('drop');const id=e.dataTransfer.getData('text/plain')||DRAG_TAG;const t=TAGS.find(x=>x.id===id);if(!t||t.category===cat)return;confirmAction('确认移动标签',[`把「${t.name}」移动到「${cat}」？`,'只改变标签类目和颜色，素材已挂标签不变。'],'确认移动',async()=>{await jpost('/api/tag/'+id,{category:cat},'PATCH');toast('已移动');await loadTags();renderTags();},false);}
function tagPillDragOver(e,target){const source=e.dataTransfer.getData('text/plain')||DRAG_TAG;if(!source||source===target)return;e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('drop');}
function tagPillDragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drop');}
function tagPillDrop(e,target){e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drop');const source=e.dataTransfer.getData('text/plain')||DRAG_TAG;if(!source||source===target)return;confirmTagMerge(source,target,async()=>{await renderTags();});}
async function createTag(){const name=$('#newTagName').value.trim();if(!name)return;await jpost('/api/tags',{name,category:$('#newTagCat').value});toast('已创建');renderTags();}
/* ── 低频标签瘦身：治理已膨胀的存量（固定词表/置顶/有卡片的不会出现） ── */
async function openPrune(maxUses=2){const d=await jget('/api/tags/lowuse',{max_uses:maxUses});
  const rows=d.tags.map(t=>`<label class="row" style="margin:3px 0;cursor:pointer"><input type="checkbox" class="pruneCk" data-id="${t.id}" checked><span style="color:${t.color}">${attr(t.name)}</span><span class="muted" style="font-size:12px">${attr(t.category)} · 用了 ${t.uses} 次</span></label>`).join('');
  openDrawer('低频标签瘦身',`<div class="sec">列出使用次数 ≤ <select id="pruneMax" onchange="openPrune(Number(this.value))">${[0,1,2,5].map(n=>`<option ${n===maxUses?'selected':''}>${n}</option>`).join('')}</select> 次的标签，共 ${d.tags.length} 个。固定词表、置顶、有别名/参考图的标签受保护不会出现。删除只清觅影记录；这些词在 AI 描述里仍可全文搜到。</div>${rows||'<div class="muted" style="padding:20px 0">没有可瘦身的低频标签 👍</div>'}${d.tags.length?`<div class="row" style="position:sticky;bottom:0;background:var(--panel);padding-top:10px"><button class="btn red" onclick="doPrune()">删除选中</button><button class="btn" onclick="document.querySelectorAll('.pruneCk').forEach(c=>c.checked=!c.checked)">反选</button><button class="btn ghost" onclick="closeDrawer()">取消</button></div>`:''}`);}
async function doPrune(){const ids=[...document.querySelectorAll('.pruneCk:checked')].map(c=>c.dataset.id);if(!ids.length)return toast('没有勾选标签');confirmAction('确认删除低频标签',[`将删除 ${ids.length} 个低频标签及其挂载记录。`,'素材和原文件不受影响；AI 描述里出现过的词仍能全文搜索到。'],'确认删除',async()=>{const r=await jpost('/api/tags/prune',{tag_ids:ids});toast(`已删除 ${r.deleted} 个标签`,'ok');await loadTags();renderTags();});}
async function openTag(id){const t=(await jget('/api/tags')).tags.find(x=>x.id===id);openDrawer('标签：'+t.name,tagDetailHTML(t));const rq=$('#refQ');if(rq)rq.value=t.name;loadRefCandidates(t.id,t.name,24);}
function tagRefBlock(t,r){const enc=encodeURIComponent(JSON.stringify(r));return `<div class="pick"><span class="x" style="float:right" onclick="removeTagRef('${t.id}','${enc}')">×</span><img src="${r.url}"><div>${attr(r.name||'参考图')}</div></div>`}
/* 合并目标选择：原生 select 几百个词根本没法找，改成可搜索输入（datalist 自带过滤）。
   输入标签名或别名都能命中；datalist 全页共享一份。 */
function tagsDatalist(){return `<datalist id="tagsDL">${TAGS.map(t=>`<option value="${attr(t.name)}">${attr(t.category)}${(t.aliases||[]).length?' · 别名:'+attr(t.aliases.join('/')):''}</option>`).join('')}</datalist>`}
function tagIdByName(v){v=(v||'').trim().toLowerCase();if(!v)return null;
  const hit=TAGS.find(t=>t.name.toLowerCase()===v)||TAGS.find(t=>(t.aliases||[]).some(a=>a.toLowerCase()===v));
  return hit?hit.id:null}
function tagDetailHTML(t){return `<div class="field"><label>名称</label><input id="tagName" style="width:100%" value="${attr(t.name)}"></div><div class="field"><label>类目</label><select id="tagCat">${CATS.map(c=>`<option ${c.name===t.category?'selected':''}>${attr(c.name)}</option>`).join('')}</select></div>
<div class="field"><label>别名，用逗号分隔</label><input id="tagAliases" style="width:100%" value="${attr((t.aliases||[]).join(','))}"></div><div class="field"><label>定义 / 备注</label><textarea id="tagNote">${attr(t.note||'')}</textarea></div>
<div class="field"><label>参考图（挑 1～3 张代表图就够）</label><div class="pickgrid">${(t.refs||[]).map(r=>tagRefBlock(t,r)).join('')||'<span class="muted">无</span>'}</div></div>
<div class="field"><label>从已有缩略图添加（按文件名/标签搜，回车刷新；星级高的排前面）</label><div class="row" style="margin-bottom:6px"><input id="refQ" style="flex:1" placeholder="搜索候选图…" onkeydown="if(isEnter(event))loadRefCandidates('${t.id}',this.value,24)"></div><div id="refPick" class="pickgrid"><span class="muted">载入中</span></div><div class="row" style="margin-top:6px"><button class="btn" onclick="refMore('${t.id}')">加载更多</button></div></div>
<div class="field"><label>并入已有标签（输入名字或别名，自动联想）</label><div class="row"><input id="mergeTarget" list="tagsDL" placeholder="搜目标标签…" style="min-width:220px"><button class="btn" onclick="mergeTag('${t.id}')">并入</button></div>${tagsDatalist()}</div>
<div class="row"><button class="btn red" onclick="saveTag('${t.id}')">保存</button><button class="btn" data-confirm="0" onclick="deleteTag('${t.id}',this)">删除标签</button></div>`}
async function saveTag(id){await jpost('/api/tag/'+id,{name:$('#tagName').value.trim(),category:$('#tagCat').value,aliases:$('#tagAliases').value.split(/[，,]/).map(x=>x.trim()).filter(Boolean),note:$('#tagNote').value},'PATCH');toast('已保存');await loadTags();renderTags();}
async function mergeTag(id){const v=$('#mergeTarget').value;const target=tagIdByName(v);
  if(!target)return toast(v?`没有叫「${v}」的标签（输入名字或别名）`:'输入目标标签名（会自动联想）');
  if(target===id)return toast('不能并入自己');
  confirmTagMerge(id,target,async()=>{closeDrawer();await renderTags();});}
function confirmTagMerge(sourceId,targetId,after){const src=TAGS.find(t=>t.id===sourceId)||{};const dst=TAGS.find(t=>t.id===targetId)||{};confirmAction('确认合并标签',[`把「${src.name||sourceId}」并入「${dst.name||targetId}」？`,`「${src.name||sourceId}」会作为「${dst.name||targetId}」的别名保存。`,'旧标签会删除，已挂素材会改挂目标标签。'],'确认合并',async()=>{await jpost('/api/tag/'+sourceId+'/merge',{target_id:targetId});toast('已合并');await loadTags();if(after)await after();else await renderTags();},false);}
async function runTagMergeAI(){openDrawer('确认 AI 整理标签',`<div class="field"><p style="margin-bottom:8px">将把当前标签名和别名发给当前 AI 模型分析相似项。</p><p style="margin-bottom:8px">只生成合并建议，不会自动合并或修改标签；已有待处理建议会被本次新建议替换。</p><p style="margin-bottom:8px">深度整理会按类目分批跑，建议更多，但会慢一些。</p></div><div class="row"><button class="btn red" onclick="startTagMergeAI('deep')">深度整理</button><button class="btn" onclick="startTagMergeAI('normal')">普通整理</button><button class="btn" onclick="closeDrawer()">取消</button></div>`);}
async function startTagMergeAI(mode='normal'){
  if(mode!=='deep'){openDrawer('AI 整理标签',`<div class="empty">正在分析标签相似度（一次调用，约几十秒）</div>`);const d=await jpost('/api/tag_merge_suggestions/generate',{mode}).catch(()=>null);if(!d)return;toast(d.count?`生成 ${d.count} 条合并建议`:'没有发现高把握合并项',d.count?'ok':undefined);TAG_MERGE_SUGGESTIONS=d.suggestions||[];renderTagMergeSuggestions();return}
  /* 深度整理：按类目逐批跑，实时进度，可停止（已完成批次结果保留） */
  await loadTags();
  const cats=CATS.map(c=>c.name).filter(n=>TAGS.filter(t=>t.category===n).length>=2);
  if(!cats.length)return toast('没有可分析的类目');
  window._tmStop=false;let got=0,failed=0;
  const paint=(i,cur,done)=>openDrawer('AI 深度整理标签',`<div class="field"><div class="progress" style="height:8px"><i style="width:${Math.round(i/cats.length*100)}%"></i></div><p style="margin-top:10px">${done?(window._tmStop?'已停止于':'已完成'):'正在分析'} ${i}/${cats.length} 个类目${cur?` · 当前「${attr(cur)}」`:''}</p><p class="muted" style="margin-top:4px">已得 ${got} 条建议${failed?` · ${failed} 批失败已跳过`:''}（每批一次模型调用，本地模型会比较慢）</p></div><div class="row">${done?`<button class="btn red" onclick="showTagMergeSuggestions()">查看建议</button>`:`<button class="btn" onclick="window._tmStop=true;this.textContent='正在停止…'">停止（保留已生成的建议）</button>`}<button class="btn ghost" onclick="closeDrawer()">关闭</button></div>`);
  paint(0,cats[0],false);
  let ran=0;
  for(let i=0;i<cats.length;i++){
    if(window._tmStop)break;
    paint(i,cats[i],false);
    const d=await jpost('/api/tag_merge_suggestions/generate',{mode:'deep',category:cats[i],append:i>0?1:0}).catch(()=>null);
    if(!d)failed++;else got+=(d.count||0);
    ran=i+1;
  }
  paint(ran,'',true);
  toast((got?`生成 ${got} 条合并建议`:'没有发现高把握合并项')+(failed?`，${failed} 批失败已跳过`:''),got?'ok':undefined);
  await showTagMergeSuggestions();}
async function showTagMergeSuggestions(){const d=await jget('/api/tag_merge_suggestions');TAG_MERGE_SUGGESTIONS=d.suggestions||[];renderTagMergeSuggestions();}
function renderTagMergeSuggestions(){const list=TAG_MERGE_SUGGESTIONS||[];const rows=list.map(s=>`<div class="cand merge-card"><b title="${attr(s.source_name)}">${attr(s.source_name)}</b><span class="muted">并入</span><b title="${attr(s.target_name)}">${attr(s.target_name)}</b><span class="chip">${Math.round((s.confidence||0)*100)}%</span><span class="muted merge-reason" title="${attr(s.reason||'')}">${attr(s.reason||'')}</span><div class="merge-actions"><button class="btn red" onclick="acceptTagMergeSuggestion('${s.id}')">确定</button><button class="btn" onclick="rejectTagMergeSuggestion('${s.id}')">忽略</button></div></div>`).join('');openDrawer('合并建议',`<div class="sec">AI 只给建议；点确定后还会再次确认，确认后才会把旧标签写入目标标签别名并迁移已挂素材。</div>${rows||'<div class="empty">没有待处理的合并建议</div>'}`)}

function fmtSize(n){if(!n)return '?';const u=['B','KB','MB','GB','TB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(n>=10||i===0?0:1)+u[i];}
async function backfillFingerprints(){const d=await jpost('/api/duplicates/backfill');if(!d.count)return toast(d.offline_skipped?`没有可补算的素材（${d.offline_skipped} 个所在盘离线）`:'全部素材都已有指纹','ok');showTaskHint(`补算指纹已排队：${d.count} 个${d.offline_skipped?'，离线跳过 '+d.offline_skipped:''}`);}
let DUP_SHOW_IGNORED=false;
async function showDuplicates(showIgnored){if(showIgnored!==undefined)DUP_SHOW_IGNORED=showIgnored;const d=await jget('/api/duplicates',{include_ignored:DUP_SHOW_IGNORED?1:0});const hint=$('#dupHint');if(hint)hint.textContent=d.no_fingerprint?`还有 ${d.no_fingerprint}/${d.total_assets} 个素材没算指纹，结果可能不全，建议先「补算指纹」`:'';const box=$('#dupList');if(!box)return;
  const tail=DUP_SHOW_IGNORED?`<div class="sec">正在查看已忽略的 ${d.groups.length} 组 · <a onclick="showDuplicates(false)">返回重复列表</a></div>`:(d.ignored_count?`<div class="sec">已忽略 ${d.ignored_count} 组 · <a onclick="showDuplicates(true)">查看/恢复</a></div>`:'');
  if(!d.groups.length){box.innerHTML=tail+(DUP_SHOW_IGNORED?'<div class="muted">没有忽略的组</div>':'<div class="muted">没有发现完全重复的素材</div>');return}
  box.innerHTML=tail+(DUP_SHOW_IGNORED?'':`<div class="sec">${d.groups.length} 组完全重复。删除记录只清觅影库内记录，不动原文件；有意保留的备份点「忽略此组」。</div>`)+d.groups.map(g=>`<div class="cand" style="align-items:flex-start"><div class="thumbs">${g.items.filter(x=>x.thumb).slice(0,1).map(x=>`<img src="${thumb(x.thumb)}">`).join('')||`<div class="ph">${assetIcon('photo')}</div>`}</div><div style="flex:1;min-width:0">${g.items.map(x=>`<div class="row" style="margin:2px 0"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44%" title="${attr(x.rel_path)}">${attr(x.name)}</span><span class="muted">${attr(x.volume)}${x.online?'':' · 离线'} · ${fmtSize(x.size)}</span><div class="spacer"></div><button class="btn ghost" onclick="openAsset('${x.asset_id}')">详情</button><button class="btn ghost" onclick="deleteDupRecord('${x.asset_id}')">删除记录</button></div>`).join('')}</div><div style="text-align:right"><b>×${g.count}</b><br>${DUP_SHOW_IGNORED?`<button class="btn ghost" style="margin-top:6px" onclick="ignoreDupGroup('${g.content_id}',1)">恢复提示</button>`:`<button class="btn ghost" style="margin-top:6px" title="认定这组是有意的多盘备份，以后不再提示" onclick="ignoreDupGroup('${g.content_id}',0)">忽略此组</button>`}</div></div>`).join('');}

function catDragStart(e,id){DRAG_CAT=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);e.currentTarget.classList.add('dragging');}

async function runCheckup(){const box=$('#checkupBox');if(!box)return;box.innerHTML='<span class="muted">检查中…（含模型探活，最多几秒）</span>';

  box.innerHTML=`<div class="sec">素材 <b>${d.assets_total}</b> · 卷 ${d.volumes.length} 个${offVols.length?`（离线 ${offVols.length}：${offVols.map(v=>attr(v.name)+'·'+v.assets+'素材').join('、')}）`:'（全部在线）'}<br>

/* ── 危险区：统一 = 影响预览 + 输入确认短语 + 任务运行时后端409 + 自动备份 + 审计 ── */
function dzPhraseRow(phrase){return `<div class="field"><label>输入 <b>${phrase}</b> 确认（防误触）</label><input id="dzConfirm" placeholder="${phrase}" autocomplete="off" style="width:100%"></div>`}
function dzCheck(phrase){const v=($('#dzConfirm')||{value:''}).value.trim();if(v!==phrase){toast('请输入 '+phrase+' 确认','err');return null}return v}
async function dzPost(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});let d={};try{d=await r.json()}catch{}
  if(!r.ok){toast(String(d.detail||d.error||('HTTP '+r.status)).slice(0,120),'err');return null}return d}

  <div class="sec" id="dzScopeTg" style="display:none">清 素材关联 <b>${s.asset_links}</b> 条 / 文件夹关联 ${s.folder_links} 条 / 排除 ${s.excludes} 条 / 候选词 ${s.candidates} 条 / 合并建议 ${s.merge_suggestions} 条，并重置素材上的 AI 描述 ${s.ai_descs} 条和打标状态 ${s.status_tagged} 个；词表、类目、参考图原样保留，人工备注和星级不动。适用：换模型对全库重新打标。<br><label style="cursor:pointer;user-select:none"><input type="checkbox" id="dzKeepLocked" checked> 保留已锁定素材的标签和 AI 描述（${s.locked_with_tags} 个锁定素材；此模式词表还在，锁才保得住）</label></div>

function importTagsFile(inp){const f=inp.files[0];if(!f)return;inp.value='';window._TAGIMP=f;

  <div class="field"><label>方式</label><select id="tagImpMode" style="width:100%">

    <option value="replace">替换（危险）—— 清空现有词表后按文件重建，打标关系连带清空（会先自动备份）</option>

  let r,d;try{r=await fetch('/api/tags/import?mode='+mode,{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:f});d=await r.json()}catch(e){return toast('导入失败：'+String(e.message||e).slice(0,80),'err')}
